spring:
  datasource:
    url: jdbc:postgresql://ep-fancy-waterfall-a163vz5f-pooler.ap-southeast-1.aws.neon.tech/order?sslmode=require&channel_binding=require
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: refresh

app:
  message: "hello-order order"



eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  register-with-eureka: true
  fetch-registry: true

